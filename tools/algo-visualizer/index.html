<!DOCTYPE html>
<!--
  GPS pathfinding visualizer — a LEARNING tool, not production code.

  Shows the real engine's pipeline end to end on a toy map:
    1. FIELD  — the reverse Dijkstra flood from the goal (gps DistanceField):
                walking flooded symmetrically, origin-bound transports reversed
                exactly, origin-free teleports NOT flooded.
    2. FLOOR  — min over teleports of (cast cost + field(landing)) (SearchHeuristic):
                the admissible cap that stands in for "teleports usable from anywhere".
    3. SEARCH — forward A* from the start (Pathfinder), h = min(field, floor),
                priority queue visible, settled/frontier painted live.
    4. CHAIN  — routes surface as goals pop; each route's primary method is then
                excluded and the next search runs with a RECOMPUTED (higher) floor
                (AlternativeRoutesService's exclusion chain), until walking wins.

  Run: just open this file in a browser (CDN React; needs internet on first load).
-->
<html>
<head>
<meta charset="utf-8">
<title>GPS pathfinding visualizer</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { margin: 0; background: #17181c; color: #d8d8d8; font: 13px/1.45 "Segoe UI", sans-serif; }
  #root { display: flex; flex-direction: column; height: 100vh; }
  .top { display: flex; gap: 12px; padding: 12px; flex: 1; min-height: 0; }
  canvas { background: #101114; border: 1px solid #2c2e34; border-radius: 6px; image-rendering: pixelated; }
  .side { width: 340px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
  .panel { background: #1e2026; border: 1px solid #2c2e34; border-radius: 6px; padding: 8px 10px; }
  .panel h3 { margin: 0 0 6px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #8ab4f8; }
  .controls { display: flex; gap: 8px; align-items: center; padding: 10px 12px; background: #1e2026; border-top: 1px solid #2c2e34; flex-wrap: wrap; }
  button { background: #2b2e36; color: #e8e8e8; border: 1px solid #3a3e48; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 13px; }
  button:hover { background: #383c46; }
  button.primary { background: #2a5cc4; border-color: #4c8bf5; }
  .pq { font-family: Consolas, monospace; font-size: 11.5px; white-space: pre; }
  .log { font-family: Consolas, monospace; font-size: 11px; max-height: 180px; overflow-y: auto; }
  .log div { padding: 1px 0; }
  .routes div { padding: 3px 6px; margin: 3px 0; background: #26292f; border-left: 3px solid #4c8bf5; border-radius: 3px; }
  .phase { font-size: 15px; font-weight: 600; }
  .muted { color: #8a8f99; }
  input[type=range] { width: 130px; }
  .legend span { display: inline-block; margin: 1px 8px 1px 0; }
  .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef, useMemo } = React;

/* ───────────────────────── The toy world ─────────────────────────
   S start, G goal, # wall.
   Boat 'a' → 'A' (origin-bound, one-way, cost 8): note 'a' is WEST of S —
   the optimal boat route walks AWAY from the goal first.
   Teleports (origin-free): T (cast 10), U (cast 13) — landings only.        */
const MAP_ROWS = [
  "############################################",
  "#..........#...............#..............#",
  "#..........#...............#..............#",
  "#..a.......#......U........#.....T........#",
  "#..........#...............#..............#",
  "#....S.....#...............#...A....G.....#",
  "#..........#...............#..............#",
  "#..........#...............#..............#",
  "#..........#...............#..............#",
  "#..........#...............#..............#",
  "#..........#...............#..............#",
  "#..........#...............#..............#",
  "#..........................#..............#",
  "#..........#..............................#",
  "#..........#...............#..............#",
  "############################################",
];
const H = MAP_ROWS.length, W = MAP_ROWS[0].length;
const idx = (x, y) => y * W + x;
const XY = i => [i % W, Math.floor(i / W)];
const walkable = [];
let START = -1, GOAL = -1;
const specials = {};
for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
  const c = MAP_ROWS[y][x];
  walkable[idx(x, y)] = c !== '#';
  if (c === 'S') START = idx(x, y);
  if (c === 'G') GOAL = idx(x, y);
  if ('aAtTuU'.includes(c)) specials[c] = idx(x, y);
}
// Methods. Origin-bound transport: boat a->A. Origin-free teleports: T, U.
const BOAT = { id: 'boat', label: 'Boat a→A', kind: 'transport', origin: specials['a'], dest: specials['A'], cost: 8, color: '#4db6ac' };
const TELE_T = { id: 'teleT', label: 'Teleport T', kind: 'teleport', dest: specials['T'], cost: 10, color: '#b46fd4' };
const TELE_U = { id: 'teleU', label: 'Teleport U', kind: 'teleport', dest: specials['U'], cost: 13, color: '#e57399' };
const METHODS = [BOAT, TELE_T, TELE_U];

function* neighbors(i) { // 8-dir walking, cost 1 (run-tile model; corner rules omitted for clarity)
  const [x, y] = XY(i);
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    if (!dx && !dy) continue;
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && ny >= 0 && nx < W && ny < H && walkable[idx(nx, ny)]) yield idx(nx, ny);
  }
}

/* ───────────────────── Trace builder (runs everything up front) ───────────────────── */
function buildTrace(useHeuristic) {
  const ev = [];   // the full event stream the scrubber replays
  const field = new Array(W * H).fill(Infinity);

  // Phase 1 — DistanceField: reverse Dijkstra from the goal. Walking is symmetric;
  // the boat is reversed EXACTLY (settling its destination relaxes its origin);
  // teleports are origin-free and deliberately NOT flooded.
  ev.push({ t: 'phase', phase: 'FIELD', note: 'Reverse Dijkstra flood from the goal (DistanceField)' });
  {
    const pq = [[0, GOAL]];
    field[GOAL] = 0;
    while (pq.length) {
      pq.sort((p, q) => p[0] - q[0]);
      const [d, i] = pq.shift();
      if (d > field[i]) continue;
      ev.push({ t: 'fieldSettle', cell: i, d });
      for (const n of neighbors(i)) if (d + 1 < field[n]) { field[n] = d + 1; pq.push([d + 1, n]); }
      // exact reverse of the origin-bound boat: from its DESTINATION, relax its ORIGIN
      if (i === BOAT.dest && d + BOAT.cost < field[BOAT.origin]) {
        field[BOAT.origin] = d + BOAT.cost;
        pq.push([field[BOAT.origin], BOAT.origin]);
        ev.push({ t: 'log', msg: `field: reversed ${BOAT.label} — origin relaxed to ${field[BOAT.origin]}` });
      }
    }
  }

  // Exclusion chain: search, surface a route, exclude its primary method, repeat.
  const excluded = new Set();
  const routes = [];
  for (let k = 0; k < 4; k++) {
    const teles = [TELE_T, TELE_U].filter(m => !excluded.has(m.id));
    // Phase 2 — the FLOOR (SearchHeuristic): teleports usable from anywhere mean the true
    // remaining cost from ANY tile is <= cast + field(landing). Recomputed per search:
    // excluding good teleports RAISES it, strengthening the heuristic when searches get hard.
    let floor = Infinity;
    for (const m of teles) floor = Math.min(floor, m.cost + field[m.dest]);
    ev.push({ t: 'phase', phase: `FLOOR #${k}`, note: teles.length
      ? `floor = min(cast + field(landing)) = ${floor}` : 'no teleports left — floor = ∞' });
    for (const m of teles) ev.push({ t: 'log', msg: `floor: ${m.label} gives ${m.cost} + ${field[m.dest]} = ${m.cost + field[m.dest]}` });
    const h = i => useHeuristic ? Math.min(field[i], floor) : 0;

    // Phase 3 — forward A* (Pathfinder): settle-ordered by f = g + h; origin-free teleports
    // enter as landing candidates at g = cast cost (the degenerate one-band "hub").
    ev.push({ t: 'phase', phase: `SEARCH #${k}`, note: `forward A* (h = ${useHeuristic ? 'min(field, floor)' : '0 — Dijkstra'})`
      + (excluded.size ? `, excluded: ${[...excluded].join(', ')}` : '') });
    const g = new Array(W * H).fill(Infinity);
    const parent = {}, parentEdge = {};
    const settled = new Set();
    let pq = [];
    const push = (i, gi, via, edge) => {
      if (gi >= g[i]) return;
      g[i] = gi; parent[i] = via; parentEdge[i] = edge;
      pq.push([gi + h(i), gi, i]);
      ev.push({ t: 'enqueue', k, cell: i, g: gi, h: h(i), f: gi + h(i), pq: null });
    };
    push(START, 0, -1, null);
    for (const m of teles) {
      push(m.dest, m.cost, START, m.id);
      ev.push({ t: 'log', msg: `search #${k}: ${m.label} lands in the queue at g=${m.cost} (usable from anywhere ⇒ candidate immediately)` });
    }
    let goalCost = -1;
    while (pq.length) {
      pq.sort((p, q) => p[0] - q[0]);
      const [f, gi, i] = pq.shift();
      if (settled.has(i)) { ev.push({ t: 'dup', k, cell: i }); continue; }
      if (gi > g[i]) { ev.push({ t: 'dup', k, cell: i }); continue; }
      settled.add(i);
      ev.push({ t: 'settle', k, cell: i, g: gi, h: h(i), f, pqTop: pq.slice(0, 14).map(e => ({ f: e[0], g: e[1], cell: e[2] })) });
      if (i === GOAL) { goalCost = gi; ev.push({ t: 'log', msg: `search #${k}: GOAL POPPED at f = g = ${gi} — every cheaper f has been settled; this is optimal` }); break; }
      for (const n of neighbors(i)) push(n, gi + 1, i, null);
      if (i === BOAT.origin && !excluded.has(BOAT.id)) push(BOAT.dest, gi + BOAT.cost, i, BOAT.id);
    }
    if (goalCost < 0) { ev.push({ t: 'log', msg: `search #${k}: goal unreachable — chain ends` }); break; }

    // Extract the route + its primary method; then exclude it (the chain's next branch).
    const path = [];
    let cur = GOAL, primary = null;
    while (cur !== -1 && cur !== undefined) {
      path.push(cur);
      if (parentEdge[cur]) primary = parentEdge[cur];
      cur = parent[cur];
    }
    path.reverse();
    const label = primary ? METHODS.find(m => m.id === primary).label : 'Walk only';
    routes.push({ cost: goalCost, path, method: label });
    ev.push({ t: 'route', k, cost: goalCost, path, method: label });
    if (!primary) { ev.push({ t: 'log', msg: 'chain: walk-only route found — nothing cheaper than walking remains, chain stops' }); break; }
    excluded.add(primary);
    ev.push({ t: 'log', msg: `chain: excluding "${label}" and searching again (same field, higher floor)` });
  }
  ev.push({ t: 'phase', phase: 'DONE', note: `${routes.length} routes, cheapest first — exactly what the panel lists` });
  return { ev, field };
}

/* ───────────────────── Replay: fold events[0..step] into a drawable state ───────────────────── */
function makeState() {
  return { phase: '', note: '', field: new Array(W * H).fill(Infinity), settled: new Set(),
           enq: new Set(), searchK: -1, pqTop: [], routes: [], log: [], lastCell: -1, floorNote: '' };
}
function applyEvent(s, e) {
  switch (e.t) {
    case 'phase':
      s.phase = e.phase; s.note = e.note;
      if (e.phase.startsWith('SEARCH')) { s.settled = new Set(); s.enq = new Set(); s.pqTop = []; }
      s.log.push(`── ${e.phase}: ${e.note}`);
      break;
    case 'fieldSettle': s.field[e.cell] = e.d; s.lastCell = e.cell; break;
    case 'enqueue': s.enq.add(e.cell); break;
    case 'settle': s.settled.add(e.cell); s.lastCell = e.cell; s.pqTop = e.pqTop || []; s.searchK = e.k; break;
    case 'dup': break;
    case 'route': s.routes.push(e); s.log.push(`★ route ${s.routes.length}: ${e.method}, cost ${e.cost}`); break;
    case 'log': s.log.push(e.msg); break;
  }
  return s;
}

/* ───────────────────── Rendering ───────────────────── */
const CELL = 17;
function draw(canvas, st, trace) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const maxField = 60;
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const i = idx(x, y);
    let fill = walkable[i] ? '#191b1f' : '#33363e';
    const fd = st.field[i];
    if (walkable[i] && fd !== Infinity) {
      const t = Math.min(1, fd / maxField);
      fill = `rgba(${40 + 30 * t}, ${90 - 40 * t}, ${200 - 120 * t}, 0.55)`;   // blue→dim: the field heat
    }
    if (st.enq.has(i)) fill = '#7a5a18';
    if (st.settled.has(i)) fill = '#245c33';
    ctx.fillStyle = fill;
    ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
  }
  // routes found so far (dim previous, bright latest)
  st.routes.forEach((r, ri) => {
    ctx.strokeStyle = ri === st.routes.length - 1 ? '#ff9a1f' : 'rgba(255,154,31,.35)';
    ctx.lineWidth = 2.5; ctx.beginPath();
    r.path.forEach((c, j) => { const [x, y] = XY(c); const px = x * CELL + CELL / 2, py = y * CELL + CELL / 2;
      j ? ctx.lineTo(px, py) : ctx.moveTo(px, py); });
    ctx.stroke();
  });
  if (st.lastCell >= 0) {  // current pop
    const [x, y] = XY(st.lastCell);
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
    ctx.strokeRect(x * CELL + 1, y * CELL + 1, CELL - 3, CELL - 3);
  }
  const badge = (i, txt, color) => { const [x, y] = XY(i);
    ctx.fillStyle = color; ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
    ctx.fillStyle = '#101114'; ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center';
    ctx.fillText(txt, x * CELL + CELL / 2, y * CELL + CELL / 2 + 4); };
  badge(START, 'S', '#e8e8e8'); badge(GOAL, 'G', '#3cc86a');
  badge(BOAT.origin, 'a', BOAT.color); badge(BOAT.dest, 'A', BOAT.color);
  badge(TELE_T.dest, 'T', TELE_T.color); badge(TELE_U.dest, 'U', TELE_U.color);
}

/* ───────────────────── App ───────────────────── */
function App() {
  const [useH, setUseH] = useState(true);
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(6);           // events per frame
  const trace = useMemo(() => buildTrace(useH), [useH]);
  const canvasRef = useRef(null);
  const cacheRef = useRef({ at: -1, st: null });

  const stateAt = (t) => {
    let { at, st } = cacheRef.current;
    if (!st || t < at) { st = makeState(); at = -1; }
    for (let i = at + 1; i <= t && i < trace.ev.length; i++) applyEvent(st, trace.ev[i]);
    cacheRef.current = { at: Math.min(t, trace.ev.length - 1), st };
    return st;
  };

  useEffect(() => {
    if (!playing) return;
    const h = setInterval(() => setStep(s => {
      const n = Math.min(s + speed, trace.ev.length - 1);
      if (n === trace.ev.length - 1) setPlaying(false);
      return n;
    }), 30);
    return () => clearInterval(h);
  }, [playing, speed, trace]);

  const st = stateAt(step);
  useEffect(() => { if (canvasRef.current) draw(canvasRef.current, st, trace); });

  const jump = (name) => {
    const i = trace.ev.findIndex(e => e.t === 'phase' && e.phase.startsWith(name));
    if (i >= 0) { setStep(i); setPlaying(true); }
  };

  return <React.Fragment>
    <div className="top">
      <div>
        <canvas ref={canvasRef} width={W * CELL} height={H * CELL}/>
        <div className="panel legend" style={{ marginTop: 8 }}>
          <span><span className="sw" style={{ background: 'rgba(45,85,190,.6)' }}/>field (cost→goal)</span>
          <span><span className="sw" style={{ background: '#245c33' }}/>settled</span>
          <span><span className="sw" style={{ background: '#7a5a18' }}/>in queue</span>
          <span><span className="sw" style={{ background: '#ff9a1f' }}/>route</span>
          <span><span className="sw" style={{ background: BOAT.color }}/>boat a→A (cost 8)</span>
          <span><span className="sw" style={{ background: TELE_T.color }}/>teleport T (cast 10)</span>
          <span><span className="sw" style={{ background: TELE_U.color }}/>teleport U (cast 13)</span>
        </div>
      </div>
      <div className="side">
        <div className="panel">
          <div className="phase">{st.phase || '—'}</div>
          <div className="muted">{st.note}</div>
          <div className="muted">event {step} / {trace.ev.length - 1}</div>
        </div>
        <div className="panel">
          <h3>Priority queue (top of heap)</h3>
          <div className="pq">{'   f     g     h   tile\n' + st.pqTop.map(e => {
            const [x, y] = XY(e.cell);
            return `${String(e.f).padStart(4)}  ${String(e.g).padStart(4)}  ${String(e.f - e.g).padStart(4)}  (${x},${y})`;
          }).join('\n') || '(empty)'}</div>
        </div>
        <div className="panel routes">
          <h3>Routes found (the panel's list)</h3>
          {st.routes.map((r, i) => <div key={i}>#{i + 1} — {r.method}, cost {r.cost}</div>)}
          {!st.routes.length && <div className="muted">none yet</div>}
        </div>
        <div className="panel">
          <h3>Event log</h3>
          <div className="log">{st.log.slice(-60).map((m, i) => <div key={i}>{m}</div>)}</div>
        </div>
      </div>
    </div>
    <div className="controls">
      <button className="primary" onClick={() => setPlaying(p => !p)}>{playing ? 'Pause' : 'Play'}</button>
      <button onClick={() => setStep(s => Math.min(s + 1, trace.ev.length - 1))}>Step</button>
      <button onClick={() => { setStep(0); setPlaying(false); cacheRef.current = { at: -1, st: null }; }}>Reset</button>
      <label>speed <input type="range" min="1" max="40" value={speed} onChange={e => setSpeed(+e.target.value)}/></label>
      <span className="muted">jump:</span>
      <button onClick={() => jump('FIELD')}>field flood</button>
      <button onClick={() => jump('SEARCH #0')}>search #0</button>
      <button onClick={() => jump('SEARCH #1')}>search #1</button>
      <button onClick={() => jump('SEARCH #2')}>search #2</button>
      <label style={{ marginLeft: 12 }}>
        <input type="checkbox" checked={useH} onChange={e => { setUseH(e.target.checked); setStep(0); setPlaying(false); cacheRef.current = { at: -1, st: null }; }}/>
        {' '}use heuristic (off = pure Dijkstra — compare how much more it settles)
      </label>
      <input type="range" min="0" max={trace.ev.length - 1} value={step} style={{ flex: 1, minWidth: 160 }}
             onChange={e => { setStep(+e.target.value); setPlaying(false); }}/>
    </div>
  </React.Fragment>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
